<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface Neural Gemini 3.1</title>
    <style>
        :root { --neon-blue: #00f3ff; --bg-dark: #0a0a0a; }
        body { background: var(--bg-dark); color: white; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .terminal { width: 90%; max-width: 600px; height: 80vh; background: #111; border: 1px solid var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); display: flex; flex-direction: column; border-radius: 8px; }
        .header { background: var(--neon-blue); color: black; padding: 5px 15px; font-weight: bold; font-size: 12px; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; scrollbar-width: thin; }
        .input-line { display: flex; border-top: 1px solid #333; padding: 10px; background: #000; }
        input { flex: 1; background: transparent; border: none; color: var(--neon-blue); outline: none; font-size: 16px; }
        .bot-msg { color: var(--neon-blue); margin-bottom: 15px; line-height: 1.4; }
        .user-msg { color: #fff; opacity: 0.7; margin-bottom: 15px; }
        .cursor { display: inline-block; width: 10px; height: 18px; background: var(--neon-blue); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="terminal">
    <div class="header">TERMINAL_V3.1_FLASH_LITE - STATUS: ONLINE</div>
    <div id="chat">
        <div class="bot-msg">Sistemas inicializados. O que você deseja processar hoje, humano?</div>
    </div>
    <div class="input-line">
        <span style="color:var(--neon-blue); margin-right:10px;">></span>
        <input type="text" id="userInput" placeholder="Digite seu comando..." autofocus>
        <span class="cursor"></span>
    </div>
</div>

<script>
    const input = document.getElementById('userInput');
    const chat = document.getElementById('chat');

    input.addEventListener('keypress', async (e) => {
        if (e.key === 'Enter' && input.value) {
            const msg = input.value;
            input.value = '';
            
            chat.innerHTML += `<div class="user-msg">USER@ROOT: ${msg}</div>`;

            try {
                const res = await fetch('/perguntar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ mensagem: msg })
                });
                const data = await res.json();
                chat.innerHTML += `<div class="bot-msg">AI_AGENT: ${data.resposta}</div>`;
                chat.scrollTop = chat.scrollHeight;
            } catch (err) {
                chat.innerHTML += `<div class="bot-msg" style="color:red">ERROR: Falha na uplink neural.</div>`;
            }
        }
    });
</script>
</body>
</html>
